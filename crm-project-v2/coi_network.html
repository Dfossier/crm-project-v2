<html lang="en">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
#app { display: flex; height: 100vh; width: 100vw; }

#sidebar { width: 300px; min-width: 300px; background: #161a24; border-right: 1px solid #2a2f3e; display: flex; flex-direction: column; overflow: hidden; z-index: 10; }
#sidebar-header { padding: 14px 16px; border-bottom: 1px solid #2a2f3e; }
#sidebar-header h1 { font-size: 13px; font-weight: 700; color: #fff; }
#sidebar-header p { font-size: 10px; color: #7a8199; margin-top: 2px; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 10px; border-bottom: 1px solid #2a2f3e; }
.stat { background: #1e2232; border-radius: 6px; padding: 8px 10px; }
.stat-val { font-size: 15px; font-weight: 700; color: #60a5fa; }
.stat-lbl { font-size: 9px; color: #7a8199; margin-top: 1px; }

#controls-bar { padding: 8px 10px; border-bottom: 1px solid #2a2f3e; display: flex; gap: 5px; flex-wrap: wrap; }
.ctrl-pill { font-size: 10px; padding: 4px 9px; border-radius: 12px; border: 1px solid #2a2f3e; background: #1e2232; color: #9aa0b4; cursor: pointer; transition: all .15s; white-space: nowrap; }
.ctrl-pill.active { border-color: #60a5fa; color: #60a5fa; background: #1d3a5c; }
.ctrl-pill.geo-active { border-color: #a78bfa; color: #a78bfa; background: #2d1f4a; }

#search-box { padding: 8px 10px; border-bottom: 1px solid #2a2f3e; }
#search-input { width: 100%; background: #1e2232; border: 1px solid #2a2f3e; border-radius: 6px; color: #e0e0e0; padding: 6px 10px; font-size: 11px; outline: none; }
#search-input:focus { border-color: #60a5fa; }

#info-panel { flex: 1; overflow-y: auto; padding: 10px; }
#info-panel::-webkit-scrollbar { width: 3px; }
#info-panel::-webkit-scrollbar-thumb { background: #2a2f3e; border-radius: 2px; }

.info-card { background: #1e2232; border-radius: 7px; padding: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; transition: border-color .15s; }
.info-card:hover { border-color: #3a4060; }
.info-card h3 { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 5px; }
.info-row { font-size: 10px; color: #9aa0b4; margin-top: 3px; display: flex; justify-content: space-between; }
.info-row span { color: #d0d4e0; }
.tag { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 8px; margin: 2px 2px 2px 0; }
.tag-officer { background: #1d3a5c; color: #60a5fa; }
.tag-multi { background: #2d1f4a; color: #a78bfa; }
.tag-linked { background: #1a3a2a; color: #4ade80; }
.info-link { font-size: 10px; color: #60a5fa; text-decoration: none; display: block; margin-top: 5px; }
.info-link:hover { text-decoration: underline; }
.section-lbl { font-size: 9px; font-weight: 700; color: #4a5068; text-transform: uppercase; letter-spacing: 1px; margin: 8px 0 5px; }

#canvas-wrap { flex: 1; position: relative; overflow: hidden; }
svg { width: 100%; height: 100%; }

#tooltip { position: absolute; pointer-events: none; background: rgba(15,17,23,.97); border: 1px solid #2a2f3e; border-radius: 8px; padding: 11px 13px; font-size: 11px; max-width: 240px; z-index: 100; display: none; box-shadow: 0 4px 20px rgba(0,0,0,.6); }
#tooltip h4 { font-size: 12px; color: #fff; margin-bottom: 5px; }
.trow { color: #9aa0b4; margin-bottom: 3px; font-size: 10px; }
.trow span { color: #e0e0e0; }

#map-btns { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; }
.map-btn { background: rgba(22,26,36,.9); border: 1px solid #2a2f3e; border-radius: 6px; color: #9aa0b4; padding: 5px 11px; font-size: 11px; cursor: pointer; transition: all .15s; }
.map-btn:hover, .map-btn.active { border-color: #60a5fa; color: #60a5fa; }

#legend { position: absolute; bottom: 14px; left: 14px; background: rgba(22,26,36,.92); border: 1px solid #2a2f3e; border-radius: 8px; padding: 10px 12px; font-size: 10px; }
.leg-section { font-size: 9px; color: #4a5068; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px; margin-top: 8px; }
.leg-section:first-child { margin-top: 0; }
.leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; color: #9aa0b4; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

.region-band { fill-opacity: 0.04; stroke-opacity: 0.15; }
</style>
</head>

;

const REGION_COLORS = G.summary.region_colors;

// ── Stats ────────────────────────────────────────────────────────────────────
const s = G.summary;
document.getElementById('stats').innerHTML = `
  <div class="stat"><div class="stat-val">${s.total_assets}</div><div class="stat-lbl">Assets</div></div>
  <div class="stat"><div class="stat-val">${s.total_grants}</div><div class="stat-lbl">Grants/yr</div></div>

  <div class="stat"><div class="stat-val">${s.multi_board}</div><div class="stat-lbl">Multi-board</div></div>
`;

// ── SVG setup ─────────────────────────────────────────────────────────────────
const svg = d3.select('#graph');
const wrap = document.getElementById('canvas-wrap');
const W = () => wrap.clientWidth, H = () => wrap.clientHeight;

const zoomBehavior = d3.zoom().scaleExtent([0.08, 5]).on('zoom', e => root.attr('transform', e.transform));
svg.call(zoomBehavior);

const root = svg.append('g');
const regionLayer = root.append('g').attr('id', 'region-layer');
const linkLayer  = root.append('g');
const nodeLayer  = root.append('g');
const labelLayer = root.append('g');

// ── Scales ───────────────────────────────────────────────────────────────────
const assetMax = d3.max(G.nodes.filter(n => n.type === 'foundation'), n => n.assets) || 1;
const fR = n => Math.max(16, Math.sqrt(n.assets / assetMax) * 52);
const pR = n => n.n_foundations > 1 ? 9 : n.is_officer ? 7 : 5;
const nodeR = n => n.type === 'foundation' ? fR(n) : pR(n);

function personColor(n) {
  if (n.n_foundations > 1) return '#f59e0b';
  if (n.is_officer) return '#4ade80';
  return '#9aa0b4';
}

// ── Simulation ───────────────────────────────────────────────────────────────
let geoMode = false;

const sim = d3.forceSimulation(G.nodes)
  .force('link', d3.forceLink(G.links).id(d => d.id).distance(80).strength(0.35))
  .force('charge', d3.forceManyBody().strength(d => d.type === 'foundation' ? -500 : -60))
  .force('collision', d3.forceCollide().radius(d => nodeR(d) + 4))
  .force('center', d3.forceCenter(W() / 2, H() / 2))
  .force('geoX', d3.forceX(d => d.region_cx * W()).strength(0))
  .force('geoY', d3.forceY(d => d.region_cy * H()).strength(0));

// ── Links ────────────────────────────────────────────────────────────────────
const linkEl = linkLayer.selectAll('line').data(G.links).join('line')
  .attr('stroke', d => d.is_officer ? '#4ade8033' : '#ffffff14')
  .attr('stroke-width', d => d.is_officer ? 1.5 : 0.7);

// ── Nodes ────────────────────────────────────────────────────────────────────
const nodeEl = nodeLayer.selectAll('g').data(G.nodes).join('g')
  .style('cursor', 'pointer')
  .call(d3.drag()
    .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end',   (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

// LinkedIn ring
nodeEl.filter(d => d.type === 'person' && d.linkedin_url)
  .append('circle').attr('r', d => pR(d) + 3.5)
  .attr('fill', 'none').attr('stroke', '#4ade80').attr('stroke-width', 1.5)
  .attr('stroke-dasharray', '3,2').attr('opacity', 0.65);

// Main circle
nodeEl.append('circle')
  .attr('r', nodeR)
  .attr('fill', d => d.type === 'foundation' ? d.region_color : personColor(d))
  .attr('fill-opacity', d => d.type === 'foundation' ? 0.18 : 0.82)
  .attr('stroke', d => d.type === 'foundation' ? d.region_color : personColor(d))
  .attr('stroke-width', d => d.type === 'foundation' ? 2 : 1);

// Foundation initials
nodeEl.filter(d => d.type === 'foundation').append('text')
  .text(d => d.name.split(' ').filter(w => /^[A-Z]/.test(w)).map(w=>w[0]).join('').slice(0,3))
  .attr('text-anchor','middle').attr('dy','0.35em')
  .attr('font-size','8px').attr('font-weight','700')
  .attr('fill', d => d.region_color).attr('pointer-events','none');

// ── Labels ───────────────────────────────────────────────────────────────────
let showLabels = true;
const labelEl = labelLayer.selectAll('text').data(G.nodes).join('text')
  .text(d => d.type === 'foundation'
    ? d.name.replace(/ (Foundation|Inc|LLC|Of|In|For|And)/gi,'').trim().slice(0,22)
    : d.name.split(' ').slice(-1)[0])
  .attr('text-anchor','middle')
  .attr('dy', d => nodeR(d) + 11)
  .attr('font-size', d => d.type === 'foundation' ? '9px' : '7.5px')
  .attr('fill', d => d.type === 'foundation' ? d.region_color : '#555e78')
  .attr('pointer-events','none');

// ── Tick ─────────────────────────────────────────────────────────────────────
sim.on('tick', () => {
  linkEl.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeEl.attr('transform',d=>`translate(${d.x},${d.y})`);
  labelEl.attr('x',d=>d.x).attr('y',d=>d.y);
});

// ── Region bands ─────────────────────────────────────────────────────────────
// Region bands are drawn from settled node positions, not preset coords
function drawRegionBands() {
  regionLayer.selectAll('*').remove();
  if (!geoMode) return;
  // Group nodes by region and compute centroid + bounding radius from actual positions
  const byRegion = {};
  G.nodes.forEach(n => {
    if (!n.x || !n.y) return;
    if (!byRegion[n.region]) byRegion[n.region] = [];
    byRegion[n.region].push(n);
  });
  Object.entries(byRegion).forEach(([r, nodes]) => {
    if (!nodes.length) return;
    const color = REGION_COLORS[r] || '#9aa0b4';
    const cx = d3.mean(nodes, n => n.x);
    const cy = d3.mean(nodes, n => n.y);
    const radius = Math.max(80, d3.max(nodes, n => Math.hypot(n.x - cx, n.y - cy)) + 40);
    regionLayer.append('circle')
      .attr('cx', cx).attr('cy', cy).attr('r', radius)
      .attr('fill', color).attr('fill-opacity', 0.06)
      .attr('stroke', color).attr('stroke-opacity', 0.25).attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '6,4');
    regionLayer.append('text')
      .attr('x', cx).attr('y', cy - radius - 8)
      .attr('text-anchor', 'middle').attr('font-size', '12px').attr('font-weight', '700')
      .attr('fill', color).attr('opacity', 0.75).text(r);
  });
}

// ── Geo / Network toggle ──────────────────────────────────────────────────────
function setGeoMode(on) {
  geoMode = on;
  document.getElementById('btn-geo').classList.toggle('active', on);
  document.getElementById('btn-network').classList.toggle('active', !on);
  document.getElementById('region-legend-title').style.display = on ? '' : 'none';
  const regionLegItems = Object.entries(REGION_COLORS).map(([r,c]) =>
    `<div class="leg-row"><div class="leg-dot" style="background:${c}"></div>${r}</div>`).join('');
  document.getElementById('region-legend-items').innerHTML = on ? regionLegItems : '';

  // Recolor nodes by region when geo is on
  nodeEl.select('circle:last-of-type')
    .attr('fill', d => on || d.type === 'foundation' ? d.region_color : personColor(d))
    .attr('stroke', d => on || d.type === 'foundation' ? d.region_color : personColor(d));

  if (on) {
    // Remove center force, boost geo forces, soften charge
    sim.force('center', null);
    sim.force('geoX', d3.forceX(d => d.region_cx * W()).strength(0.45));
    sim.force('geoY', d3.forceY(d => d.region_cy * H()).strength(0.45));
    sim.force('charge', d3.forceManyBody().strength(d => d.type === 'foundation' ? -200 : -30));
  } else {
    // Restore network layout
    sim.force('center', d3.forceCenter(W() / 2, H() / 2));
    sim.force('geoX', d3.forceX(W() / 2).strength(0));
    sim.force('geoY', d3.forceY(H() / 2).strength(0));
    sim.force('charge', d3.forceManyBody().strength(d => d.type === 'foundation' ? -500 : -60));
  }

  sim.alpha(0.8).restart();
  // Redraw bands once layout settles
  setTimeout(drawRegionBands, 2000);
}

document.getElementById('btn-geo').addEventListener('click', () => setGeoMode(true));
document.getElementById('btn-network').addEventListener('click', () => setGeoMode(false));

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
nodeEl.on('mousemove', (e, d) => {
  let h = `<h4>${d.name}</h4>`;
  if (d.type === 'foundation') {
    h += `<div class="trow">Region <span style="color:${d.region_color}">${d.region}</span></div>`;
    h += `<div class="trow">Assets <span>${d.assets_fmt}</span></div>`;
    h += `<div class="trow">Annual grants <span>${d.grants_fmt}</span></div>`;
    h += `<div class="trow">Board size <span>${d.board_size}</span></div>`;
  } else {
    if (d.title) h += `<div class="trow">Title <span>${d.title}</span></div>`;
    h += `<div class="trow">Region <span style="color:${d.region_color}">${d.region}</span></div>`;
    h += `<div class="trow">Foundations <span>${d.n_foundations}</span></div>`;
    h += `<div class="trow">Assets stewarded <span>${d.total_assets_fmt}</span></div>`;
    if (d.employer) h += `<div class="trow">Employer <span>${d.employer.slice(0,40)}</span></div>`;
    if (d.linkedin_url) h += `<div class="trow" style="color:#4ade80">✓ LinkedIn found</div>`;
  }
  tooltip.innerHTML = h;
  tooltip.style.display = 'block';
  const rect = wrap.getBoundingClientRect();
  tooltip.style.left = (e.clientX - rect.left + 14) + 'px';
  tooltip.style.top  = (e.clientY - rect.top  - 10) + 'px';
}).on('mouseleave', () => tooltip.style.display = 'none');

// ── Selection ─────────────────────────────────────────────────────────────────
function selectNode(d) {
  const connected = new Set([d.id]);
  G.links.forEach(l => {
    const s = typeof l.source==='object'?l.source.id:l.source;
    const t = typeof l.target==='object'?l.target.id:l.target;
    if (s===d.id) connected.add(t);
    if (t===d.id) connected.add(s);
  });
  nodeEl.attr('opacity', n => connected.has(n.id) ? 1 : 0.1);
  linkEl.attr('opacity', l => {
    const s = typeof l.source==='object'?l.source.id:l.source;
    const t = typeof l.target==='object'?l.target.id:l.target;
    return connected.has(s) && connected.has(t) ? 1 : 0.04;
  });
  labelEl.attr('opacity', n => connected.has(n.id) ? 1 : 0);

  let html = '';
  if (d.type === 'foundation') {
    html = `<div class="info-card" style="border-color:${d.region_color}44">
      <h3>${d.name}</h3>
      <div class="info-row">Region <span style="color:${d.region_color}">${d.region}</span></div>
      <div class="info-row">Assets <span>${d.assets_fmt}</span></div>
      <div class="info-row">Grants/yr <span>${d.grants_fmt}</span></div>
      <div class="info-row">Board <span>${d.board_size} members</span></div>
      ${d.website ? `<a class="info-link" href="${d.website}" target="_blank">↗ Website</a>` : ''}
    </div><div class="section-lbl">Board members</div>`;
    G.nodes.filter(n => n.type==='person' && connected.has(n.id))
      .sort((a,b) => (b.is_officer?1:0)-(a.is_officer?1:0))
      .forEach(m => {
        html += `<div class="info-card" data-id="${m.id}">
          <h3>${m.name}</h3>
          ${m.titles?.[d.name] ? `<div style="font-size:9px;color:#7a8199;margin-bottom:4px">${m.titles[d.name]}</div>` : ''}
          <div>${m.is_officer?'<span class="tag tag-officer">Officer</span>':''}${m.n_foundations>1?'<span class="tag tag-multi">Multi-board</span>':''}${m.linkedin_url?'<span class="tag tag-linked">LinkedIn</span>':''}</div>
          ${m.linkedin_url?`<a class="info-link" href="${m.linkedin_url}" target="_blank">↗ LinkedIn</a>`:''}
        </div>`;
      });
  } else {
    html = `<div class="info-card" style="border-color:${d.region_color}44">
      <h3>${d.name}</h3>
      ${d.title?`<div class="info-row" style="font-size:9px;color:#7a8199">${d.title}</div>`:''}
      <div class="info-row">Region <span style="color:${d.region_color}">${d.region}</span></div>
      <div class="info-row">Foundations <span>${d.n_foundations}</span></div>
      <div class="info-row">Assets stewarded <span>${d.total_assets_fmt}</span></div>
      <div class="info-row">Grants stewardship <span>${d.total_grants_fmt}</span></div>
      ${d.employer?`<div class="info-row">Employer <span>${d.employer.slice(0,40)}</span></div>`:''}
      <div style="margin-top:7px">${d.is_officer?'<span class="tag tag-officer">Officer</span>':''}${d.n_foundations>1?'<span class="tag tag-multi">Multi-board</span>':''}${d.linkedin_url?'<span class="tag tag-linked">LinkedIn</span>':''}</div>
      ${d.linkedin_url?`<a class="info-link" href="${d.linkedin_url}" target="_blank">↗ LinkedIn Profile</a>`:''}
    </div><div class="section-lbl">Foundation connections</div>`;
    d.foundations.forEach(fn => {
      const f = G.nodes.find(n=>n.type==='foundation'&&n.name===fn);
      if (f) html += `<div class="info-card" data-id="${f.id}">
        <h3>${f.name}</h3>
        ${d.titles?.[fn]?`<div style="font-size:9px;color:#7a8199;margin-bottom:4px">${d.titles[fn]}</div>`:''}
        <div class="info-row">Assets <span>${f.assets_fmt}</span></div>
        <div class="info-row">Grants <span>${f.grants_fmt}</span></div>
      </div>`;
    });
  }
  document.getElementById('ranked-list').innerHTML = html;
  document.querySelectorAll('#ranked-list .info-card[data-id]').forEach(el =>
    el.addEventListener('click', () => {
      const node = G.nodes.find(n=>n.id===el.dataset.id);
      if (node) selectNode(node);
    }));
}

nodeEl.on('click', (e,d) => { e.stopPropagation(); selectNode(d); });
svg.on('click', () => {
  nodeEl.attr('opacity',1); linkEl.attr('opacity',1);
  labelEl.attr('opacity', showLabels?1:0);
  renderDefaultList();
});

// ── Default sidebar list ──────────────────────────────────────────────────────
function renderDefaultList() {
  const fNodes = G.nodes.filter(n=>n.type==='foundation').sort((a,b)=>b.assets-a.assets);
  let html = '<div class="section-lbl">Foundations by assets</div>';
  fNodes.forEach(f => {
    html += `<div class="info-card" data-id="${f.id}">
      <h3>${f.name}</h3>
      <div class="info-row">Region <span style="color:${f.region_color}">${f.region}</span></div>
      <div class="info-row">Assets <span>${f.assets_fmt}</span></div>
      <div class="info-row">Grants/yr <span>${f.grants_fmt}</span></div>
      <div class="info-row">Board <span>${f.board_size} members</span></div>
    </div>`;
  });
  document.getElementById('ranked-list').innerHTML = html;
  document.querySelectorAll('#ranked-list .info-card[data-id]').forEach(el =>
    el.addEventListener('click', () => {
      const node = G.nodes.find(n=>n.id===el.dataset.id);
      if (node) selectNode(node);
    }));
}
renderDefaultList();

// ── Filters ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.ctrl-pill[data-filter]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.ctrl-pill[data-filter]').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    const f = this.dataset.filter;
    nodeEl.attr('opacity', d => {
      if (d.type==='foundation') return 1;
      if (f==='all') return 1;
      if (f==='officer') return d.is_officer?1:0.08;
      if (f==='multi') return d.n_foundations>1?1:0.08;
      if (f==='linkedin') return d.linkedin_url?1:0.08;
      return 1;
    });
  });
});

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { nodeEl.attr('opacity',1); labelEl.attr('opacity',showLabels?1:0); return; }
  nodeEl.attr('opacity', d => d.name.toLowerCase().includes(q)?1:0.06);
  labelEl.attr('opacity', d => d.name.toLowerCase().includes(q)?1:0);
});

// ── Toolbar ───────────────────────────────────────────────────────────────────
document.getElementById('btn-labels').addEventListener('click', () => {
  showLabels = !showLabels;
  labelEl.attr('opacity', showLabels?1:0);
  document.getElementById('btn-labels').classList.toggle('active', showLabels);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  svg.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity.translate(W()/2,H()/2).scale(0.85).translate(-W()/2,-H()/2));
});
document.getElementById('btn-labels').classList.add('active');
</script>
